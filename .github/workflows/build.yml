name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: make build

      # Uncomment to upload the built JAR as a workflow artifact.
      # Useful if other workflows (e.g. server-test) need to download it,
      # or if you want to grab the JAR from the Actions UI.
      # - name: Upload JAR artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: PluginTemplate
      #     path: bin/PluginTemplate-*.jar
