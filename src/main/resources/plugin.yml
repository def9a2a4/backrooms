name: PluginTemplate
main: name.d3420b8b7fe04.def9a2a4.plugintemplate.PluginTemplatePlugin
version: ${version}
api-version: 1.21
author: You
description: A Paper plugin.

commands:
  plugintemplate:
    description: PluginTemplate commands
    usage: /plugintemplate <reload|help>
    permission: plugintemplate.admin
  backrooms:
    description: Backrooms dimension commands
    usage: /backrooms [leave|goto <level>|regenerate [level|all]|status]
    permission: backrooms.use

permissions:
  plugintemplate.admin:
    description: Allows access to all PluginTemplate commands
    default: op
  plugintemplate.reload:
    description: Allows reloading the config
    default: op
  backrooms.use:
    description: Allows entering and leaving the Backrooms
    default: true
  backrooms.admin:
    description: Allows admin backrooms commands (goto, regenerate)
    default: op
  backrooms.regenerate:
    description: Allows regenerating backrooms worlds
    default: op
