event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 5
    chance: 0.3
    sounds:
      - ambient.cave
      - ambient.warped_forest.mood
      - ambient.crimson_forest.mood
      - ambient.nether_wastes.mood
      - ambient.basalt_deltas.mood
  light_blink:
    enabled: true
    check_interval_seconds: 30
    chance: 0.15
    radius: 20
    cycles: 4
    toggle_delay_ticks: 5
    light_y: 24
    light_spacing: 4
    light_material: OCHRE_FROGLIGHT
  blackout:
    enabled: true
    check_interval_seconds: 120
    chance: 0.05
    radius: 30
    duration_seconds: 15
    light_y: 24
    light_spacing: 4
    light_material: OCHRE_FROGLIGHT
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.4
    delay_ticks: 8
    offset_blocks: 5
  wall_shift:
    enabled: true
    check_interval_seconds: 40
    chance: 0.25
    radius_min: 8
    radius_max: 20
    blocks_per_trigger: 2
  sign_placement:
    enabled: true
    check_interval_seconds: 60
    chance: 0.15
    messages:
      - "STOP"
      - "I am watching"
      - "Not real"
      - "behind you"
      - "DON'T TURN AROUND"
      - ""
      - "the exit moved"
      - "floor 2 does not exist"
      - "employee of the month: you"
      - "do not count the rooms"
      - "the carpet remembers"
      - "you've been here before"
      - "the hum is getting louder"
      - "IT SEES YOU"
      - "check the ceiling"
  fake_chat_message:
    enabled: true
    check_interval_seconds: 120
    chance: 0.08
    messages:
      - "<Steve> hello?"
      - "<Steve> is anyone there"
      - "Steve left the game"
      - "<xX_Player_Xx> has anyone found the exit"
      - "<Unknown> don't look behind you"
      - "Employee2441 joined the game"
      - "Employee2441 left the game"
      - "<{player}> wait what"

exit_triggers:
  - type: collect_items
    target_level: level_1
    item: WRITTEN_BOOK
    threshold: 7
    transition:
      blindness_ticks: 60
      delay_ticks: 20
