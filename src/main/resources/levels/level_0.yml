id: level_0
display_name: "The Lobby"
generator: level_0
environment: NORMAL
dimension_type: dark
biome: "backrooms:lobby"
enter_message: "§7§kxx§r §7You have entered the §fBack§kr§rooms§7. §7§kxx"

events:
  - ambient_sound
  - light_blink
  - blackout
  - footstep_echo
  - wall_shift
  - sign_placement
  - fake_chat_message

entities:
  - herobrine

entity_instances:
  level0_mannequin_angel:
    type: mannequin
    skin: player  # copies the target player's own skin
    scale: 1.0
    behavior: weeping_angel
    spawn_chance: 0.10
    min_escalation: 0
    weeping_angel:
      look_angle: 28.0
      approach_interval_ticks: 5
      approach_distance: 2.5
      close_distance: 8.0
  level0_attacker_player:
    type: mannequin
    skin: player  # copies the target player's own skin
    scale: 1.0
    behavior: attack
    spawn_chance: 0.06
    min_escalation: 1
    attack:
      charge_speed: 0.8
      attack_distance: 2.0
      damage: 10.0
  level0_attacker_shadow:
    type: mannequin
    skin: "https://textures.minecraft.net/texture/b089eda62a203acf6d6425d95129bb5b0df07761092c18e882ed0470842ee6d1"  # null
    scale: 1.0
    behavior: attack
    spawn_chance: 0.06
    min_escalation: 1
    attack:
      charge_speed: 0.6
      attack_distance: 2.0
      damage: 10.0
  level0_floating_head:
    type: floating_head
    skin: "https://textures.minecraft.net/texture/de507cfcfbd14d9fe9970f553a934f643c2a393dbc6b7d8ccee75909dbc4ebfa"  # herobrine
    scale: 1.5
    behavior: stationary_stare
    spawn_chance: 0.12
    min_escalation: 0
    stationary_stare:
      despawn_distance: 6.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 5
    chance: 0.3
    sounds:
      - ambient.cave
      - ambient.warped_forest.mood
      - ambient.crimson_forest.mood
      - ambient.nether_wastes.mood
      - ambient.basalt_deltas.mood
  light_blink:
    enabled: true
    check_interval_seconds: 30
    chance: 0.15
    radius: 20
    cycles: 4
    toggle_delay_ticks: 5
    light_y: 24
    light_spacing: 4
    light_material: OCHRE_FROGLIGHT
  blackout:
    enabled: true
    check_interval_seconds: 120
    chance: 0.05
    radius: 30
    duration_seconds: 15
    light_y: 24
    light_spacing: 4
    light_material: OCHRE_FROGLIGHT
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.4
    delay_ticks: 8
    offset_blocks: 5
  wall_shift:
    enabled: true
    check_interval_seconds: 40
    chance: 0.25
    radius_min: 8
    radius_max: 20
    blocks_per_trigger: 2
  sign_placement:
    enabled: true
    check_interval_seconds: 60
    chance: 0.15
    messages:
      - "STOP"
      - "I am watching"
      - "Not real"
      - "behind you"
      - "DON'T TURN AROUND"
      - ""
      - "the exit moved"
      - "floor 2 does not exist"
      - "employee of the month: you"
      - "do not count the rooms"
      - "the carpet remembers"
      - "you've been here before"
      - "the hum is getting louder"
      - "IT SEES YOU"
      - "check the ceiling"
  fake_chat_message:
    enabled: true
    check_interval_seconds: 120
    chance: 0.08
    messages:
      - "<Steve> hello?"
      - "<Steve> is anyone there"
      - "Steve left the game"
      - "<xX_Player_Xx> has anyone found the exit"
      - "<Unknown> don't look behind you"
      - "Employee2441 joined the game"
      - "Employee2441 left the game"
      - "<{player}> wait what"

exit_triggers:
  - type: collect_items
    target_level: level_1
    item: WRITTEN_BOOK
    threshold: 16
    transition:
      blindness_ticks: 60
      delay_ticks: 20
