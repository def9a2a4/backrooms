id: level_7
display_name: "The Corrupted Chunk"
generator: level_7
environment: NETHER
dimension_type: dark
biome: "backrooms:corrupted_chunk"
enter_message: "§4§k||§r §c[FATAL] WorldGen has encountered an unrecoverable error §4§k||"

events:
  - ambient_sound
  - fake_chat_message
  - light_blink
  - random_potion
  - block_corruption
  - sign_placement

entities: []

entity_instances:
  corrupted_notch:
    type: mannequin
    skin: "https://textures.minecraft.net/texture/78df1772cb93461bfa5f8518a66b215acf3d1e352968168e7054b62685f3ec11"  # notch-bloody
    scale: 27.0
    behavior: stationary_stare
    spawn_chance: 0.15
    min_escalation: 0
    stationary_stare:
      despawn_distance: 10.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 3
    chance: 0.4
    sounds:
      - ambient.cave
      - ambient.warped_forest.mood
      - ambient.crimson_forest.mood
      - ambient.nether_wastes.mood
      - ambient.basalt_deltas.mood
  fake_chat_message:
    enabled: true
    check_interval_seconds: 20
    chance: 0.3
    messages:
      - "§c[FATAL] §fChunkLoadError at region r.4.7.mca"
      - "§c[FATAL] §fjava.lang.NullPointerException"
      - "§e[WARN] §fEntity tick overflow"
      - "§e[WARN] §fBlock update cascade exceeded maximum depth"
      - "§c[ERR] §fWorldGen seed mismatch — expected: 0, got: ∞"
      - "§7[Server] §fAttempting world recovery... failed."
      - "§c[FATAL] §fjava.lang.StackOverflowError: reality.check()"
      - "§c[FATAL] §fBlock ID -1 at Y=-64: invalid state"
      - "§e[WARN] §fLight engine desynchronized — recalculating... §c[FAILED]"
      - "§7[Server] §fWorld recovery attempt 2147483647... failed."
      - "§c[ERR] §fEntity 'Notch' loaded with invalid NBT"
      - "§c[FATAL] §fHeap space exhausted. Reason: infinite loop in ChunkGenerator"
  light_blink:
    enabled: true
    check_interval_seconds: 10
    chance: 0.3
    radius: 30
    cycles: 8
    toggle_delay_ticks: 2
    light_y: 13
    light_spacing: 4
    light_material: GLOWSTONE
  random_potion:
    enabled: true
    check_interval_seconds: 20
    chance: 0.25
    duration_ticks: 80
    max_amplifier: 1
  block_corruption:
    enabled: true
    check_interval_seconds: 30
    chance: 0.2
    radius: 25
    cube_size: 4
  sign_placement:
    enabled: true
    check_interval_seconds: 45
    chance: 0.15
    messages:
      - "§kMISSING TEXTURE"
      - "§kchunk corrupted"
      - "NullPointerException"
      - "seed: 0"
      - "§4FATAL"
      - ""
      - "r.0.0.mca"
      - "§kblock_id: -1"
      - "the generator broke"
      - "every block at once"

exit_triggers:
  - type: below_y
    target_level: overworld
    y_threshold: 0
    transition:
      blindness_ticks: 100
      delay_ticks: 30
