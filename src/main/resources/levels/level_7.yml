    cycles: 8
    toggle_delay_ticks: 2
  random_potion:
    enabled: true
    check_interval_seconds: 20
    chance: 0.25
    duration_ticks: 80
    max_amplifier: 1
  block_corruption:
    enabled: true
    check_interval_seconds: 30
    chance: 0.2
    radius: 25
    cube_size: 4
