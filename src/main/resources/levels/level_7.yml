id: level_7
display_name: "The Corrupted Chunk"
generator: level_7
environment: THE_END
enter_message: "§4§k||§r §c[FATAL] WorldGen has encountered an unrecoverable error §4§k||"

events:
  - ambient_sound
  - fake_chat_message
  - light_blink

entities: []

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 3
    chance: 0.4
    sounds:
      - AMBIENT_CAVE
      - AMBIENT_WARPED_FOREST_MOOD
      - AMBIENT_CRIMSON_FOREST_MOOD
      - AMBIENT_NETHER_WASTES_MOOD
      - AMBIENT_BASALT_DELTAS_MOOD
  fake_chat_message:
    enabled: true
    check_interval_seconds: 20
    chance: 0.3
    messages:
      - "§c[FATAL] §fChunkLoadError at region r.4.7.mca"
      - "§c[FATAL] §fjava.lang.NullPointerException"
      - "§e[WARN] §fEntity tick overflow"
      - "§e[WARN] §fBlock update cascade exceeded maximum depth"
      - "§c[ERR] §fWorldGen seed mismatch — expected: 0, got: ∞"
      - "§7[Server] §fAttempting world recovery... failed."
  light_blink:
    enabled: true
    check_interval_seconds: 10
    chance: 0.3
    radius: 30
    cycles: 8
    toggle_delay_ticks: 2
