id: level_1
display_name: "The Habitable Zone"
generator: level_1
environment: NETHER
dimension_type: dark
biome: "backrooms:habitable_zone"
enter_message: "§7Something drips in the distance."

events:
  - ambient_sound
  - footstep_echo
  - light_blink
  - blackout
  - wall_shift
  - sign_placement

entities:
  - herobrine

entity_instances:
  level1_mannequin:
    type: mannequin
    skin: player
    scale: 1.0
    behavior: stalk
    spawn_chance: 0.08
    min_escalation: 0
    stalk:
      approach_speed: 0.04
      despawn_distance: 5.0
  level1_floating_head:
    type: floating_head
    skin: "http://textures.minecraft.net/texture/ea0c43536e47e78c780a2c1a3db0cc242f5e8b2d3c5b7e63a659f58fe1c3b0ce"
    scale: 1.0
    behavior: stationary_stare
    spawn_chance: 0.10
    min_escalation: 0
    stationary_stare:
      despawn_distance: 5.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - ambient.cave
      - ambient.basalt_deltas.mood
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.5
    delay_ticks: 12
    offset_blocks: 8
  light_blink:
    enabled: true
    check_interval_seconds: 30
    chance: 0.15
    radius: 20
    cycles: 4
    toggle_delay_ticks: 5
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
  blackout:
    enabled: true
    check_interval_seconds: 120
    chance: 0.05
    radius: 30
    duration_seconds: 15
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
