id: level_1
display_name: "The Habitable Zone"
generator: level_1
environment: NETHER
dimension_type: dark
biome: "backrooms:habitable_zone"
enter_message: "§7Something drips in the distance."

events:
  - ambient_sound
  - footstep_echo
  - light_blink
  - blackout
  - wall_shift
  - sign_placement

entities:
  - herobrine

entity_instances:
  level1_mannequin:
    type: mannequin
    skin: player  # copies the target player's own skin
    scale: 1.0
    behavior: stalk
    spawn_chance: 0.08
    min_escalation: 0
    stalk:
      approach_speed: 0.04
      despawn_distance: 5.0
  level1_floating_head:
    type: floating_head
    skin: "https://textures.minecraft.net/texture/d63139c6ee85655d6ef54c8d329bd597833b94dcd6b756e12fcdc171358a2b69"  # faceless-steve
    scale: 1.0
    behavior: stationary_stare
    spawn_chance: 0.10
    min_escalation: 0
    stationary_stare:
      despawn_distance: 5.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - ambient.cave
      - ambient.basalt_deltas.mood
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.5
    delay_ticks: 12
    offset_blocks: 8
  light_blink:
    enabled: true
    check_interval_seconds: 30
    chance: 0.15
    radius: 20
    cycles: 4
    toggle_delay_ticks: 5
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
  blackout:
    enabled: true
    check_interval_seconds: 120
    chance: 0.05
    radius: 30
    duration_seconds: 15
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
  wall_shift:
    enabled: true
    check_interval_seconds: 50
    chance: 0.20
  sign_placement:
    enabled: true
    check_interval_seconds: 90
    chance: 0.10
    messages:
      - "Wake up"
      - "Not real"
      - "you've been here before"
      - ""
      - "water level rising"
      - "DO NOT DRINK"
      - "the dripping stopped"
      - "someone was here"
      - "go deeper"
      - "it followed me from Level 0"
      - "the walls are wet"
      - "IIII IIII IIII II"

exit_triggers:
  - type: submerged_below_y
    target_level: level_2
    y_threshold: 5
    transition:
      blindness_ticks: 80
      nausea_ticks: 100
      delay_ticks: 30
      message: "The water pulls you under..."
  - type: above_y
    target_level: level_94
    y_threshold: 27
    transition:
      blindness_ticks: 60
      nausea_ticks: 60
      delay_ticks: 20
      message: "You climb through the breach..."
