id: level_1
display_name: "The Habitable Zone"
generator: level_1
environment: NETHER
dimension_type: dark
biome: "backrooms:habitable_zone"
enter_message: "§7Something drips in the distance."

events:
  - ambient_sound
  - footstep_echo
  - light_blink
  - blackout

entities:
  - herobrine

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - ambient.cave
      - ambient.basalt_deltas.mood
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.5
    delay_ticks: 12
    offset_blocks: 8
  light_blink:
    enabled: true
    check_interval_seconds: 30
    chance: 0.15
    radius: 20
    cycles: 4
    toggle_delay_ticks: 5
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
  blackout:
    enabled: true
    check_interval_seconds: 120
    chance: 0.05
    radius: 30
    duration_seconds: 15
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
