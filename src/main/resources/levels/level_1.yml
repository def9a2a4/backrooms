event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - ambient.cave
      - ambient.basalt_deltas.mood
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.5
    delay_ticks: 12
    offset_blocks: 8
  light_blink:
    enabled: true
    check_interval_seconds: 30
    chance: 0.15
    radius: 20
    cycles: 4
    toggle_delay_ticks: 5
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
  blackout:
    enabled: true
    check_interval_seconds: 120
    chance: 0.05
    radius: 30
    duration_seconds: 15
    light_y: 18
    light_spacing: 11
    light_material: VERDANT_FROGLIGHT
  wall_shift:
    enabled: true
    check_interval_seconds: 50
    chance: 0.20
  sign_placement:
    enabled: true
    check_interval_seconds: 90
    chance: 0.10
    messages:
      - "Wake up"
      - "Not real"
      - "you've been here before"
      - ""
      - "water level rising"
      - "DO NOT DRINK"
      - "the dripping stopped"
      - "someone was here"
      - "go deeper"
      - "it followed me from Level 0"
      - "the walls are wet"
      - "IIII IIII IIII II"

exit_triggers:
  - type: submerged_below_y
    target_level: level_2
    y_threshold: 5
    transition:
      blindness_ticks: 80
      nausea_ticks: 100
      delay_ticks: 30
      message: "The water pulls you under..."
  - type: above_y
    target_level: level_94
    y_threshold: 27
    transition:
      blindness_ticks: 60
      nausea_ticks: 60
      delay_ticks: 20
      message: "You climb through the breach..."
