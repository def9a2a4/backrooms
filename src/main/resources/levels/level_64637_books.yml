# ─── Library of Babel — Book Text Configuration ───
# All text content for books found in chiseled bookshelves on Level 64637.
# Server admins can freely add, remove, or edit entries here.
# Cursed snippets are embedded within pages of random gibberish characters.
# Longer snippets are more unsettling because the reader has to process them
# surrounded by meaningless text — like finding a scream in a sea of static.

# Characters used to generate random gibberish pages (Babel-style)
gibberish_chars: "abcdefghijklmnopqrstuvwxyz .,;:'-"

# Chance (0.0-1.0) that a book contains a cursed snippet instead of pure gibberish
cursed_chance: 0.05

# Cursed snippets — one is randomly embedded in a page of gibberish
cursed_snippets:
  # --- Original short snippets ---
  - "you have been here before and you will be here again"
  - "the exit was removed from the index on purpose"
  - "someone is reading over your shoulder right now"
  - "this book was written for you specifically"
  - "the pages change when you look away"
  - "level 64637 does not exist in any catalogue"
  - "you cannot unread this"
  - "the librarian knows your name"
  - "do not trust the one who brought you here"
  - "the shelves go deeper than the world allows"
  - "every book here is a copy of a book that does not exist"
  - "the last person who read this sentence never left"
  - "you are not the first to stand in this exact spot"
  - "this room was not here a moment ago"
  - "the walls are listening"
  # --- Minecraft-specific ---
  - "the seed was set to zero and the library grew from it"
  - "this world was last saved by Herobrine"
  - "the index lists a book with your coordinates as the title"
  - "the library predates the server"
  - "one of these books contains the command to shut down the server"
  # --- Longer, more developed passages ---
  - "every book you have ever read is a translation of a book found here. the original is always worse. the original contains the parts that were cut for your safety."
  - "there is a book here that describes your death. it has been checked out. the borrower's name is your name. the due date was yesterday."
  - "the catalogue has a section for books that will be written tomorrow. it is the largest section. it is growing faster than the rest of the library combined."
  - "the librarian is not a person. the librarian is a function of the library. it indexes. it shelves. it watches. it does not blink because it has no eyes. it does not need eyes."
  - "you will put this book back on the shelf and forget what it said. you will walk three aisles over and pick up another book. it will contain this same sentence. you will not notice."
  - "the library contains a complete copy of itself, including this sentence, including the copy, including the copy of the copy. the recursion has no bottom."
  - "the gaps between the shelves are getting narrower. you have not noticed because you have been getting narrower too. you will fit perfectly between them soon."
  - "there is no ground floor. there is no top floor. the stairs go in both directions forever. the landings are numbered but the numbers are not sequential and some of them are negative."
  - "the lights flicker in a pattern. the pattern is your heartbeat. when your heartbeat changes, the lights adjust. they have been synchronized since you arrived. you did not consent to this."
  - "the library remembers every player who has ever entered. their names are written in a book on the top shelf of aisle 0. the book has no last page. none of the names have been crossed out. none have left."
  - "you are reading this because the library wanted you to find this book on this shelf at this moment. every book you passed over was placed there to guide you here. you have no free will in the library. you only have the illusion of browsing."
  - "there is a section of the library where the books are warm to the touch. the pages pulse. the ink moves when you are not looking directly at it. the librarians do not go there. the section is growing."
  - "the oldest book in the library predates language. its pages are blank. or rather, its pages contain a language so old that your eyes slide off it. you have read it before. you will read it again. you will never remember what it says."
  - "every book in the library has the same number of pages. they are all the same book, translated into every possible arrangement of characters. one arrangement is your life story. most are gibberish. you cannot tell which is which."
  - "the library does not end. this is not a metaphor or an exaggeration. it does not end. it extends in all directions past the boundaries of the world. the world was built inside the library, not the other way around."
  - "the book you are holding is aware that you are holding it. not in the way a person is aware. in the way a mousetrap is aware of the mouse. you are already caught. the pages are the jaws."
  - "somewhere in this library is a book that contains only the word 'help,' repeated for every page. it was not written. it was grown. the shelf it sits on is warmer than the others."
  - "the catalogue uses a notation that no one invented. the librarians follow it because it works. it describes the location of every book, including books that have not been written yet. it is always correct."
  - "if you rearrange the gibberish on this page it spells a name. the name is yours. every page in every book spells a name. the library has enough pages for everyone. it has had enough pages since before there was anyone."
  - "the last sentence of the last book on the last shelf of the last aisle reads: 'and then the library began.' this is not the last book. the library does not know which book is last. the library is afraid to find out."
  # --- SCP Foundation inspired ---
  - "the store is now closed. please exit the building."
  - "item #: scp-64637. object class: keter. special containment procedures: none. the anomaly cannot be contained because it is the container."
  - "exploration log iv: subject descended 41 flights. audio recorded a child crying approximately 200 meters below. subject never reached the source. the stairwell has no endpoint."
  - "addendum: testing suspended indefinitely. d-class personnel reported the books were reading them back. monitoring confirmed eye movement in the text."
  - "containment breach report: the shelves extended past the walls of the facility at 03:47. by 04:00 the facility was inside the library. reclassification to keter approved."
  - "interview log ████-1: 'it looked like an employee. yellow shirt, blue trousers. but the proportions were wrong. too long. and it had no face. it said the store was closed.'"
  - "scp-087 supplemental: knocking from interior of stairwell persisted for 14 days following exploration iv. frequency: 1-2 seconds per knock. source remains 200 meters below regardless of measurement position."
  - "note: the entity does not chase. it follows at a fixed distance. the distance is always exactly the length of one aisle. it has been following you since you entered this section."
  - "the anomaly resembles a standard fluorescent light fixture. when observed directly, it functions normally. when unobserved, it produces a tone at 277.18 hz. the tone is not sound. it is language."
  # --- Herobrine inspired ---
  - "i saw him between the shelves. default skin. white eyes. he was holding a book. the book was this book."
  - "this world was last saved three years before you were born."
  - "changelog v0.0.0: added the library. removed herobrine. added herobrine. removed the exit. the library remembers the version before this one."
  - "someone has been cutting 2x2 tunnels through the shelves. perfect squares, no debris. they go deeper than the shelves should allow. at the end of each tunnel is a sign that says 'stop.'"
  - "it has been reported that some victims of torture, during the act, would retreat into a fantasy world from which they could not wake up. you are reading a book in a library that does not exist. wake up."
  - "removed herobrine. removed herobrine. removed herobrine. he keeps coming back. the changelog is longer than the game."
  # --- Backrooms lore inspired ---
  - "if you see, hear, or encounter what you believe to be another reader, it is not human."
  - "you noclipped through the wrong wall. this is not level 0. this is not any level. the wiki has no entry for this place. you are in the margin."
  - "m.e.g. exploration log 64637-7: operative entered aisle at 14:00. radio contact lost at 14:03. operative recovered 6 days later in aisle adjacent to entry point. operative aged 11 years. operative does not remember the library."
  - "the almond water tastes different here. it tastes like ink. the ink tastes like almond water. the library is teaching you to read with your tongue."
  - "you fell through the floor of level 0 and landed on a shelf. the book that broke your fall was open to a page that described you falling through the floor of level 0 and landing on a shelf."
  - "the hum is louder near the restricted section. there is no restricted section. the hum disagrees."

