# ─── Pre-Written Books ───
# Rare complete books with fixed title, author, and pages.
# These are the only fully coherent texts in the Library.
pre_written_chance: 0.08

pre_written_books:
  - title: "A Note from the Librarian"
    author: "The Librarian"
    pages:
      - "You are in the Library. It has many names in many languages, most of which have not been invented yet. You may call it whatever you wish. It will not answer to any of them."
      - "The Library contains every book that has been written, every book that will be written, and every book that could be written. Most of them are nonsense. A few are not. You will not be able to tell the difference."
      - "You may take any book from any shelf. You may not take any book from the Library. These are not contradictory statements. You will understand when you try to leave."
      - "The exit is on every floor. The exit is on no floor. Both of these are true. I am sorry that this is not more helpful."

  - title: "Borrower's Guide"
    author: "The Archivist"
    pages:
      - "Welcome to the Archive. Your borrower's card has been pre-assigned. You did not apply for it. The number on the card is the number of books you will read before you leave. Do not count them."
      - "Books may be returned to any shelf. The Library will re-sort them. The sorting algorithm is not known to us. It may not be an algorithm. It may be a preference."
      - "Overdue fines are assessed at a rate of one memory per day. The Library selects which memory. You will not notice it is gone until someone reminds you of something you no longer recall."
      - "If you find a book with your name as the author, do not read it. If you have already read it, do not read it again. If you have read it more than once, it is too late and we are sorry."

  - title: "Observations on Infinity"
    author: "No One"
    pages:
      - "I have walked the Library for what I believe to be several years. The floors repeat, but not exactly. Each repetition contains small differences — a shelf at a slightly different angle, a book with one additional page, a shadow where there was none."
      - "I have attempted to count the shelves on a single floor. I counted for three days. On the fourth day I discovered I was counting the same shelf repeatedly. Not because I had gone in a circle, but because the shelf had followed me."
      - "The books on the upper shelves are older. Not because they were placed there first, but because height is time in the Library. The ceiling is the past. The floor is the future. We stand in the present, which is the narrowest part."
      - "I found a book today that was blank when I opened it and full when I closed it. I opened it again and it was blank. I believe the book is only written while no one is reading it. This is, I think, the cruelest thing about the Library."

  - title: "Complaint (Filed)"
    author: "Unknown"
    pages:
      - "To Whom It May Concern:\n\nI am writing to formally complain about the organization of this Library. The decimal system is non-functional. The card catalogue references shelves that do not exist. The shelves that do exist are not where the catalogue says they are."
      - "Furthermore, several books I have requested are listed as 'checked out' to myself, despite the fact that I have never visited this Library before today. The dates on the borrower's cards predate my birth."
      - "I have also noted that the Library appears to have no staff, no hours of operation, no entrance, and no exit. The lights are on but there are no light fixtures. The temperature is comfortable but there is no ventilation."
      - "I expect a response within 30 business days. My return address is [this sentence goes on for the rest of the page in increasingly small handwriting that eventually becomes too small to read]"

  - title: "The Last Catalogue"
    author: "The Library Itself"
    pages:
      - "Entry 1: This book.\nEntry 2: Every other book.\nEntry 3: The book that contains entries 1 and 2.\nEntry 4: The book that is not contained in entry 3.\nEntry 5: [PARADOX — ENTRY REMOVED]"
      - "Entry 6: The book you are looking for.\nEntry 7: The book you will find instead.\nEntry 8: The book that describes the difference between entries 6 and 7.\nEntry 9: The book that explains why there is no difference."
      - "Entry 10: A complete list of all entries in this catalogue. This entry is larger than the catalogue. This is expected.\nEntry 11: A book of corrections to this catalogue. It is also incorrect."
      - "Entry 12: The final entry. The catalogue after this entry is empty. The Library after this entry is full. The relationship between the catalogue and the Library is: the catalogue is a room in the Library. The Library is a sentence in the catalogue."
