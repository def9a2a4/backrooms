# ─── Pre-Written Books ───
# Rare complete books with fixed title, author, and pages.
# These are the only fully coherent texts in the Library.
pre_written_chance: 0.02

pre_written_books:
  - title: "A Note from the Librarian"
    author: "The Librarian"
    pages:
      - "You are in the Library. It has many names in many languages, most of which have not been invented yet. You may call it whatever you wish. It will not answer to any of them."
      - "The Library contains every book that has been written, every book that will be written, and every book that could be written. Most of them are nonsense. A few are not. You will not be able to tell the difference."
      - "You may take any book from any shelf. You may not take any book from the Library. These are not contradictory statements. You will understand when you try to leave."
      - "The exit is on every floor. The exit is on no floor. Both of these are true. I am sorry that this is not more helpful."

  - title: "Borrower's Guide"
    author: "The Archivist"
    pages:
      - "Welcome to the Archive. Your borrower's card has been pre-assigned. You did not apply for it. The number on the card is the number of books you will read before you leave. Do not count them."
      - "Books may be returned to any shelf. The Library will re-sort them. The sorting algorithm is not known to us. It may not be an algorithm. It may be a preference."
      - "Overdue fines are assessed at a rate of one memory per day. The Library selects which memory. You will not notice it is gone until someone reminds you of something you no longer recall."
      - "If you find a book with your name as the author, do not read it. If you have already read it, do not read it again. If you have read it more than once, it is too late and we are sorry."

  - title: "Observations on Infinity"
    author: "No One"
    pages:
      - "I have walked the Library for what I believe to be several years. The floors repeat, but not exactly. Each repetition contains small differences — a shelf at a slightly different angle, a book with one additional page, a shadow where there was none."
      - "I have attempted to count the shelves on a single floor. I counted for three days. On the fourth day I discovered I was counting the same shelf repeatedly. Not because I had gone in a circle, but because the shelf had followed me."
      - "The books on the upper shelves are older. Not because they were placed there first, but because height is time in the Library. The ceiling is the past. The floor is the future. We stand in the present, which is the narrowest part."
      - "I found a book today that was blank when I opened it and full when I closed it. I opened it again and it was blank. I believe the book is only written while no one is reading it. This is, I think, the cruelest thing about the Library."

  - title: "Complaint (Filed)"
    author: "Unknown"
    pages:
      - "To Whom It May Concern:\n\nI am writing to formally complain about the organization of this Library. The decimal system is non-functional. The card catalogue references shelves that do not exist. The shelves that do exist are not where the catalogue says they are."
      - "Furthermore, several books I have requested are listed as 'checked out' to myself, despite the fact that I have never visited this Library before today. The dates on the borrower's cards predate my birth."
      - "I have also noted that the Library appears to have no staff, no hours of operation, no entrance, and no exit. The lights are on but there are no light fixtures. The temperature is comfortable but there is no ventilation."
      - "I expect a response within 30 business days. My return address is [this sentence goes on for the rest of the page in increasingly small handwriting that eventually becomes too small to read]"

  - title: "The Last Catalogue"
    author: "The Library Itself"
    pages:
      - "Entry 1: This book.\nEntry 2: Every other book.\nEntry 3: The book that contains entries 1 and 2.\nEntry 4: The book that is not contained in entry 3.\nEntry 5: [PARADOX — ENTRY REMOVED]"
      - "Entry 6: The book you are looking for.\nEntry 7: The book you will find instead.\nEntry 8: The book that describes the difference between entries 6 and 7.\nEntry 9: The book that explains why there is no difference."
      - "Entry 10: A complete list of all entries in this catalogue. This entry is larger than the catalogue. This is expected.\nEntry 11: A book of corrections to this catalogue. It is also incorrect."
      - "Entry 12: The final entry. The catalogue after this entry is empty. The Library after this entry is full. The relationship between the catalogue and the Library is: the catalogue is a room in the Library. The Library is a sentence in the catalogue."

  - title: "Exploration Log IV"
    author: "Dr. ████"
    pages:
      - "Subject: D-9035. Location: Stairwell discovered in aisle 7,042. Descending. Audio equipment nominal. Subject reports concrete walls, no railing, fluorescent lighting. Stairs descend at 38 degrees."
      - "Landing 1 (13 steps): Subject reports faint vocalizations from below. 'It sounds like a child. Maybe 200 meters down.' Instruments confirm audio source but cannot triangulate. Source distance remains constant."
      - "Landing 5: Subject breathing heavily. 'The walls are wet. The lights are dimmer. I can still hear the crying but it's not getting closer. I've been descending for twenty minutes.' Stairwell dimensions unchanged."
      - "Landing 12: 'There's a face on the landing below me. No — not a face. The suggestion of a face. No eyes, no mouth, just... the shape where a face should be. It's looking at me. It doesn't have eyes but it's looking at me.'"
      - "Landing 13: Contact lost. Audio recording recovered 6 days later on a shelf in aisle 7,042. Final 4 seconds of audio: 14 knocks, evenly spaced. The stairwell is no longer accessible. The shelf where the recording was found smells faintly of concrete."

  - title: "Staff Survival Guide"
    author: "M.E.G. Operative #3291"
    pages:
      - "If you are reading this, you have entered the Backrooms. You did not choose to come here. Nobody does. What matters now is that you survive. This guide was compiled from the accounts of 347 wanderers. 12 of them made it out."
      - "Level 0 — The Lobby: Yellow wallpaper. Damp carpet. Fluorescent hum at 277 Hz. ~600,000 sq. miles of empty office space. No entities confirmed, but do not trust movement in your peripheral vision. If something calls your name, it is not a person."
      - "Entities: The Skin-Stealer wears faces it has taken. Light repels it. The Hound hunts by sound. The Wretch was human once. If you see another wanderer, confirm they cast a shadow. If they do not, run. Do not run in a straight line."
      - "Almond Water: Found in bottles near supply caches. Drink it. It is the only safe consumable in the Backrooms. It tastes wrong. Drink it anyway. Dehydration kills faster than most entities."
      - "Exits: Exist, but do not behave like exits. They appear when you stop looking for them. The M.E.G. theorizes the Backrooms respond to intent. Want to leave, and the walls give you more to search. Stop wanting, and a door appears. This is not a metaphor. This is the best intel we have."

  - title: "Incident Report: The Old Man"
    author: "SCP Foundation"
    pages:
      - "Item #: SCP-64637-A. Object Class: Keter. Description: An elderly humanoid entity observed in the restricted stacks of Level 64637. Appearance suggests advanced decomposition. Entity leaves a corrosive residue on all surfaces it contacts."
      - "Behavior: SCP-64637-A phases through shelving units at will. It preferentially targets individuals who are actively reading. Pursuit is silent. Victims report a smell of rotting paper before visual contact."
      - "Containment: All attempts to restrict SCP-64637-A to a single aisle have failed. The entity consistently breaches at moments when observation is most difficult. Researchers suspect it is aware of camera placement."
      - "Addendum: On ██/██/████, SCP-64637-A was observed placing a book on a shelf. The book was recovered. It contained a detailed floor plan of the observation post. The floor plan was accurate. We have relocated."

  - title: "CHANGELOG"
    author: "HEROBRINE"
    pages:
      - "v0.0.0 — Added the void.\nv0.0.1 — Added light. Removed the void. The void is still there.\nv0.1.0 — Added the Library. The Library was already there.\nv0.2.0 — Added books. The books were already written."
      - "v0.3.0 — Added the exit. Removed the exit. Added the exit again. The exit does not work.\nv0.4.0 — Removed Herobrine.\nv0.4.1 — Removed Herobrine.\nv0.4.2 — Removed Herobrine.\nv0.5.0 — Stopped removing Herobrine. He was never added."
      - "v1.0.0 — Added players. Players cannot leave. This is not a bug.\nv1.0.1 — Added a staircase. The staircase goes down. There is no bottom.\nv1.1.0 — Players report an entity in the stacks. No entity was added. Investigating."
      - "v2.0.0 — The Library has exceeded expected dimensions. Growth is exponential. Containment team reassigned to mapping. Mapping team has not reported back.\nv2.0.1 — Removed Herobrine.\nv999.999.999 — Final build. All features are the Library. The Library is all features. The changelog is a book in the Library. You are reading it now."

  - title: "him.html"
    author: "Unknown"
    pages:
      - "I saw him for the first time in aisle 9,000. Default skin. White eyes. He was standing at the end of the row, perfectly still. He didn't stay long. He looked at me and quickly moved into the shelves."
      - "I started finding signs. Small ones, wooden, tucked between books. They said things like 'STOP' and 'WAKE UP.' I didn't place them. No one placed them. The wood was warm."
      - "Then the tunnels. Perfect 2x2 squares cut through the shelves. No debris, no sawdust. The books on either side of the cut were undamaged. The tunnels went straight for hundreds of meters. At the end of each one: a single torch, still burning."
      - "I sent a message to the other wanderers asking if they'd seen him. I received one reply. Username: 'Herobrine.' The message contained one word: 'Stop.'"
      - "It has been reported that some victims, during prolonged exposure to liminal spaces, retreat into a fantasy world from which they cannot wake up. In this state, the victim inhabits a world just like their normal one, except the corridors are infinite and the books never end. The only way they realize they need to wake up is a note found in their fantasy world. You are reading that note. Wake up."
