      - "Notes: Elevator operates normally. Doors open and close. Machinery engages when button is pressed. Car does not move. Inspector rode elevator for 45 minutes. Exited on same floor.\n\nOn 17th test, carpet inside car was slightly different shade."
      - "CERTIFICATION: APPROVED for continued operation.\n\n[Handwritten:] I am certifying an elevator that goes nowhere. It works perfectly. It will never take anyone anywhere. This is the most functional equipment on Sub-Level 0."

  - title: "Containment Procedures — Anomaly L-0"
    author: "Site Director"
    pages:
      - "Item #: SCP-L0. Object Class: Euclid (pending Keter reclassification).\n\nDescription: An extradimensional space resembling a standard American office building. Estimated area: 600,000 sq. miles minimum. Boundaries not established."
      - "Special Containment Procedures: SCP-L0 cannot be contained. All Foundation facilities within a 200-meter radius of known entry points are to be evacuated. Personnel who enter SCP-L0 are reclassified as D-Class retroactively."
      - "Addendum L0-1: Exploration team Epsilon-7 entered SCP-L0 on ██/██/████. Radio contact maintained for 4 hours. Team reported infinite repeating hallways, ambient tonal phenomenon at 277 Hz, and damp carpet with no identifiable moisture source."
      - "Addendum L0-2: At hour 4, Epsilon-7 reported visual contact with a humanoid figure at approximately 200 meters. Figure did not approach. Figure did not retreat. Epsilon-7 advanced. Distance remained 200 meters."
      - "Addendum L0-3: Epsilon-7 lost at hour 6. Final transmission: 'The hallways are getting narrower. The lights are getting brighter. The hum — it's not the building. It's us. We're the ones humming.'"
      - "NOTE FROM O5 COUNCIL: Reclassification to Keter denied. Reason: 'SCP-L0 is not hostile. SCP-L0 is patient. There is a difference. We do not wish to learn what happens when the difference ends.'"

  - title: "M.E.G. Field Report: Level 0"
    author: "M.E.G. Archivist"
    pages:
      - "FIELD REPORT 0-24\nOperative: ████\nEntry method: Noclip (involuntary)\nDuration: ~14 days (estimated)\nStatus: Recovered, debriefed, amnestic treatment recommended"
      - "Day 1-3: Standard Level 0 topology. Infinite yellow hallways, fluorescent lighting, damp carpet. No entities detected. Operative followed M.E.G. Standard Protocol: move without purpose, conserve almond water, avoid sustained attention on any one feature."
      - "Day 5: First anomaly. Operative found a supply cache — three bottles of almond water, one flashlight, one note reading 'YOU ARE NOT ALONE BUT YOU SHOULD ACT LIKE YOU ARE.' Cache was warm. Bottles were dated three days in the future."
      - "Day 8: Entity contact. Operative observed a humanoid figure standing motionless in corridor intersection. Figure appeared to be wearing the operative's own clothing. When approached, figure retreated at a pace that maintained exactly 50 meters of distance."
      - "Day 11: Operative stopped moving. Sat against a wall. Reported 'the hum changed. It wasn't a drone anymore. It had rhythm. Like breathing. I realized I was breathing in sync with it. I don't know when I started.'"
      - "Day 14: Exit manifested. Standard wooden door in a featureless wall. Operative walked through without hesitation. Emerged in entry location. Fourteen days had passed. Operative insists it was 'longer than fourteen days. Much longer.'"

  - title: "sighting_log.txt"
    author: "Unknown"
    pages:
      - "03/07: Saw him in corridor 9-A. White eyes. Default skin. Standing behind a bookshelf, watching. Blinked and he was gone. Bookshelf was warm. —Employee #2441"
      - "03/09: Found 2x2 tunnels in the wall between corridors 4 and 5. Perfect squares, smooth edges, no debris. Tunnels extend 30+ meters. Flashlight died 10 meters in. Could swear something moved at the end. —J. Kowalski"
      - "03/12: The word 'STOP' was written on my desk this morning. Same desk, same office. The letters are in the wood — not carved, not burned. Grown. Like the grain of the wood rearranged itself. —Employee #3190"
      - "03/15: He was in the elevator. I saw him through the gap in the doors. Just standing there. The elevator wasn't moving. I pressed the button. The doors opened. Empty. But the panel was warm and it smelled like redstone. —K. Marsh"
      - "03/18: Checked the server logs. Last save was by a user called 'Herobrine.' Timestamp: three years before the server was created. I showed the admin. The admin said there are no server logs. There is no server. —Dr. Vasquez"
      - "03/21: All entries in this log are in my handwriting. I didn't write them. I don't know these people. The dates are sequential but I've only been here one day. I think. The lights haven't changed once. —[REDACTED]"

  - title: "The Store Is Now Closed"
    author: "D-Class Personnel"
    pages:
      - "Day 1: I was in IKEA. A real IKEA. I walked through a doorway in the warehouse section and the ceiling got higher and the aisles got longer and the exit signs started pointing in circles. This is not a real IKEA."
      - "Day 3: Built a shelter from bookshelves and couch cushions. There are others here. They've built a small town in the living room section. They say the staff come out at night. The staff have no faces. They wear yellow shirts."
      - "Day 5: 'The store is now closed. Please exit the building.' The announcement plays every evening. There is no evening — the lights just dim. Then they come. Tall, wrong proportions, yellow shirts. They don't speak. They just repeat: 'The store is now closed.'"
      - "Day 12: I found a corridor that connects to Level 0. Same yellow wallpaper, same hum. The IKEA and the Backrooms share a wall. Or maybe they're the same place with different furniture. The staff don't cross over. Something in Level 0 scares them."
      - "Day ??: Lost count. The store is always closed now. The lights don't come back on. The staff stand in the aisles in the dark. I can hear them breathing. They don't need to breathe. I think they do it to let you know they're there."

  - title: "Addendum 087-1: The Stairwell"
    author: "Dr. ████"
    pages:
      - "Location: Utility closet, corridor 12-B. A reinforced door conceals a concrete stairwell descending at 38 degrees. Standard institutional lighting (fluorescent, 277 Hz). Stairwell width: 1.5m. No railing. Steps are damp."
      - "Exploration I — D-9035: Subject descended 14 landings. Each landing identical. Subject reported child-like vocalizations approximately 200 meters below. Source distance did not change despite descent. Subject recalled. Subject refused to discuss findings."
      - "Exploration II — D-9041: Subject descended 22 landings. At landing 18, subject reported a face on the landing below. 'Not a real face. The idea of a face. Like someone described a face to the concrete and the concrete tried.' Subject ascended rapidly."
      - "Exploration III — D-9042: Subject descended 31 landings. At landing 27, lighting ceased. Subject's flashlight illuminated the next landing. A figure stood on the landing. Figure had no features. Subject screamed. Audio feed cut."
      - "Exploration IV: No D-class personnel assigned. At 03:00, knocking was heard from the stairwell interior. One knock per second. Rhythm matched a human heartbeat. The knocking has continued for 14 days. It has not stopped. We have sealed the door."
      - "Addendum: The door was unsealed this morning. Not by staff. The stairwell is gone. Behind the door is a standard supply closet. A mop, a bucket, cleaning solution. The bucket contains water. The water is warm. The water hums."
