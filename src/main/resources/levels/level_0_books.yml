# Random single pages — 1-3 are picked per book when not using a multi-page template.
pages:
  - "The fluorescent lights buzz overhead in a pitch I can almost name. I've been walking for what feels like hours but my watch says four minutes. I stopped trusting it two hallways ago, when it started running backwards."
  - "I found a staircase today. Twelve steps up, a landing, twelve more — and I was back on the same floor, same hallway. I tried again. Same result. The third time, there were thirteen steps. I didn't try a fourth."
  - "If you are reading this, do not trust the walls. I watched them shift — not quickly, not obviously, but the hallway I walked through ten minutes ago is now two feet narrower. I measured. The tape measure is shorter each time too."
  - "Day ???: The carpet is damp again. Not wet, just damp, like morning dew on something that has never seen the sun. There are no pipes above us. I wrung out a section once and the water was warm."
  - "I counted 847 identical rooms before I stopped. Not because I gave up, but because room 848 had a chair in it. Just a chair, facing the wall. It was warm when I touched it. I don't sit in chairs anymore."
  - "The lights flicker every 23 seconds. I timed it with my heartbeat because my watch is useless now. Then the interval changed to 17. Then 11. The numbers are primes. I don't know what that means but it feels intentional."
  - "There is a smell here like old almonds and mildew, the kind that gets into your clothes and stays. It's stronger near certain walls. I've started following it. It leads to more walls that smell like almonds."
  - "I found footprints in the dust. Boot prints, my size, my tread pattern. They were ahead of me, fresh. I followed them for an hour. They ended at a bookshelf."
  - "Someone left a note on the wall in blue ink: 'GO DOWN.' But there is no down. I've checked every tile, every seam, every panel. There is nothing below this floor. Unless the floor is lying too."
  - "The hum is a C#. I know because I have perfect pitch. It comes from the floor, or the walls, or maybe from me. I've started humming along. It helps. I don't know why it helps."
  - "I woke up at a desk this morning. I don't have a desk. I don't work here. The desk had a nameplate with my name, and a coffee mug that was still warm. I didn't drink the coffee."
  - "This book was already open when I found it. It was open to this page. The previous pages are blank. I don't know who wrote this sentence, but it wasn't me. I don't think it was me."
  - "The wallpaper peels in long strips. Underneath is more wallpaper — same yellow, same pattern. I peeled through four layers before my fingernails started bleeding. I could hear more layers underneath."
  - "I left marks on the wall to track where I'd been. Notches with my pocketknife, knee height. When I circled back, the marks were already there — older, weathered, deeper than mine."
  - "I can hear someone typing. The sound comes from behind a wall with no door. A steady rhythm, like someone filling out a form. It stops when I press my ear to the wall. It starts when I step away."
  - "Every door I've opened today leads to the same room. Not similar rooms — the same room. Same stain on the ceiling, same crack in the tile. I've checked forty-seven times."
  - "The carpet squelches underfoot near the east wing. The dampness has a sharp boundary — one step dry, the next step your shoe sinks a quarter inch. The boundary moves when you're not watching."
  - "I found a phone on the wall between two rooms. Beige, rotary, no cord. It rings every few hours. When I pick up there's no voice, just the hum, slightly louder, slightly different in pitch."
  - "The lights went out for six seconds. When they came back the hallway was longer by thirty feet. The new section looked older — more faded carpet, more yellowed walls, as if it had always been there."
  - "There is a water stain on the ceiling shaped like a face. Not a random pattern — a face. Eyes, nose, mouth, all in proportion. It was not there when I walked this hallway an hour ago."
  - "I hear the hum in my teeth now. Not in my ears — in the enamel, in the roots. When I clench my jaw it gets louder. The dentist always said I had good teeth."
  - "Memo: All employees must report to Floor 2 by end of day. I've looked for Floor 2 for three days. The elevator goes 1, 3, 4. There is no stairwell between 1 and 3."
  - "The fire exit leads to another fire exit. That one leads to a hallway. The hallway leads to another fire exit. I've been through nine of them. They're all the same door. The sign says EXIT. It lies."
  - "I've been here for three days, or three weeks. The lights never dim, never brighten, never change. I sleep when I'm tired and wake when I wake and the fluorescents are always the same."
  - "Someone wrote HELP on the wall near corridor 12-C. Blue ink, block letters. The ink was still wet when I found it. I looked around for ten minutes. When I came back the ink was still wet."
  - "I keep finding the same book on every shelf. Same cover, same pages. I opened one and it was blank. I opened another and it had one sentence: 'Stop looking.' A third had two sentences."
  - "The vending machine hums louder than the lights. It has no plug — I checked. The glass is fogged. I can see shapes inside, but they aren't snacks. They might be moving."
  - "I tried sleeping in an office. I wedged the door shut with a chair. When I woke, I was in a different office. Larger. Two desks. The chair was against the door, on the wrong side."
  - "My watch stopped at 3:47. I left it on a desk. Three hallways later I found a desk with a watch on it — my watch, same scratch on the face, stopped at 3:47. I'm wearing it again."
  - "There's a window on what I think is the third floor. It doesn't show the outside. It shows another hallway, with a window in the same spot. Through that window, another hallway, another window."
  - "I found a photograph taped to the wall. It shows this hallway, from this angle, with me standing in it, reading a photograph. The photo in the photo shows the same thing, smaller."
  - "The elevator has one button. I pressed it. Doors closed. I heard machinery. Doors opened. Same floor. The seventeenth time, the carpet was a slightly different shade."
  - "I dropped a pen and heard it hit the floor twice. Once immediately, once four seconds later from somewhere below me. There is nothing below me. The pen was on the floor. I only dropped one pen."
  - "Someone has been watering the plastic plants. I know they're plastic — hard leaves, visible seams, wire stems. But the soil is wet. There's a watering can on the shelf. It's half full."
  - "The exit signs all point inward. Every single one. I followed them hoping for a center. They led me in a circle. The signs were pointing outward when I turned around."
  - "I found another copy of this note in my own handwriting on a shelf three corridors over. The paper was older. The ink was faded. The content was identical, word for word."
  - "The ceiling tiles are numbered in pencil, very small. I've seen numbers past ten thousand. They aren't sequential — 4,781, then 11,302. The system defeats me."
  - "There is a room full of filing cabinets. Metal, gray-green. Every file is blank — clean white paper, no markings. Except one. The one with my name on the tab. That file was empty."
  - "I can hear my footsteps echoing from the floor above. Same rhythm, same weight. But there is no floor above this one. I stomped once, hard. The echo stomped back."
  - "The break room coffee maker is always full and always fresh. Nobody makes it. It has no plug. The coffee tastes fine. I've been drinking it for days. I don't know if I should stop."
  - "There's a clock on the wall in 9-A. The numbers are reversed — 12 where 6 should be, 3 where 9 should be. The hands move clockwise. The time is always wrong in a way I can't calculate."
  - "I found a room with sixteen bookshelves. Every book was the employee handbook. Every revision different. Rev. 1 was two pages. Rev. 14 was four. Rev. 10,000 was a single word: 'Run.'"

# Multi-page book templates — curated books with a fixed title, author, and ordered pages.
# Chance that a generated book uses a template instead of random assembly.
multi_page_chance: 0.35

multi_page_books:
  - title: "Employee Handbook (Rev. 14)"
    author: "Management"
    pages:
      - "Welcome to [REDACTED] Corp. You have been assigned to Sub-Level 0, Sector 7. Report to your workstation immediately. If you cannot locate it, remain where you are. A supervisor will find you."
      - "Section 2.1 — Spatial Anomalies: In the event of a spatial anomaly, remain at your desk. Do not investigate. Do not alert others. File Form 77-B with your floor supervisor within 24 hours."
      - "Section 4.7 — Overtime: Overtime is mandatory and indefinite. Clocking out requires written approval from your supervisor. If your supervisor cannot be located, continue working."
      - "Section 6.3 — The Hum: The ambient sound is a normal feature of the HVAC system. Do not attempt to locate its source. Do not hum along. Employees who report it as 'getting louder' will be scheduled for a wellness check."
      - "Appendix C — Restricted Areas: The following do not exist and should not be sought: Floor 2, Sub-Level -1, The Yellow Wing, Room 0. Employees claiming to have visited these areas will be reassigned."
      - "Appendix D — Termination: Employment may be terminated at any time, without notice. 'Termination' in this context refers to your employment status. If you believe it refers to something else, disregard this appendix."

  - title: "Explorer's Journal"
    author: "M.E.G. Operative #7712"
    pages:
      - "Entry 1: Standard noclip event. Leaned against a wall, fell through. Carpet. Yellow wallpaper. Fluorescent lights. The air smells like a wet basement cleaned with industrial solvent. Classic Level 0."
      - "Entry 2: Six hours in. Every hallway identical. Marking walls with a Sharpie. Found a bookshelf with real books — most blank inside, but a few have writing. The handwriting changes mid-sentence."
      - "Entry 3: Footsteps behind me for forty minutes. Not matching my pace — slightly slower. When I stop, they continue for two more steps, then stop. When I turn around, nothing."
      - "Entry 4: Found a door marked EXIT. Heart rate spiked. It opened onto another identical hallway. Closed it. Opened again — different hallway. Third time: same as the first. The door is a liar."
      - "Entry 5: Losing track of my Sharpie marks. Either the walls absorb them or the hallways rearrange. Found one of my marks on a wall I've never visited. The ink was dry but the mark was shaking."
      - "Entry 6: Leaving this journal here. If you find it, keep moving. Do not stay in one place more than an hour. The lights notice when you stop. I can't explain how I know this, but I know it."

  - title: "Maintenance Log — Sub-Level 0"
    author: "J. Kowalski, Facilities"
    pages:
      - "03/12: Replaced fluorescent tube in 7-B. Work order said it was flickering. Tube was already new — factory sticker still on, date code says it was manufactured three days from now. Installed replacement anyway."
      - "03/15: Carpet in east wing saturated. Pulled up a section — no subfloor, just more carpet, also wet. Pulled that up too — another layer. Got four deep before my utility knife broke."
      - "03/17: Work order returned: 'East wing does not exist. Re-submit with correct location.' Went back to check. Hallway was still there. Took a photo. Photo shows an empty wall."
      - "03/19: Lights in sector 4 cycling. On 8 seconds, off 3, on 8. Checked wiring. There is no wiring. Fixtures connect to nothing. They're just sitting in the ceiling, glowing."
      - "03/22: Can't find the supply closet. Same route I walk every day. Should be between corridors 11 and 12. There is no corridor 12. Corridor 11, then 13. Nobody else notices."
      - "03/??: I have been cleaning the same hallway for a very long time. I fill the bucket, wring the mop, clean the floor. It's dirty again behind me. I think this might be all I do now."

  - title: "The Rules"
    author: "[REDACTED]"
    pages:
      - "1. Do not run. Running attracts attention.\n2. Do not look at the ceiling for more than five seconds.\n3. If you hear someone call your name, do not answer. Especially if the voice is yours."
      - "4. The lights will flicker. Count to seven. If they don't come back, walk in any direction until they return.\n5. Do not open any door that is warm.\n6. The hum is normal. If it stops, leave the room within thirty seconds."
      - "7. You will find notes and books. Not all were written by people. Read everything — some of it is true.\n8. If you find a room with a desk and chair, do not sit down. The chair is comfortable. That is the problem."
      - "9. Do not count the rooms.\n10. If Rule 9 is broken, stop immediately. Forget the number.\n11. You are not alone, but act as if you are.\n12. There is no Rule 12."

  - title: "A Note for You"
    author: "The Previous Occupant"
    pages:
      - "I know you just arrived. I know because I was where you are, standing in this exact spot, reading this exact book, feeling that cold mixture of fear and confusion. I was you. Not metaphorically."
      - "You are going to try to find the exit. You will walk the hallways systematically, then randomly, then desperately. You will open every door and follow every sound. You will not find it this way."
      - "Not because there is no exit. There is. But the Lobby doesn't work that way. The harder you search, the more it gives you to search through. It feeds on your attention."
      - "You find the exit by forgetting you're looking. By walking without purpose. By letting your mind go blank. The moment you stop wanting to leave is the moment you see the door."
      - "I am leaving this book because someone left one for me. I didn't believe them either. I searched for sixteen days. The door appeared on the seventeenth, in a hallway I'd walked a hundred times."
      - "When you're ready, put this back on the shelf. Don't take it with you. Someone else will need it. I think it's always been the same book."

  - title: "Incident Report #347"
    author: "K. Marsh, Safety Officer"
    pages:
      - "Location: Sub-Level 0, Corridor 14-D. Nature: Structural anomaly. During routine inspection, 14-D measured 47m. Previous measurement (six hours prior): 32m. No construction activity scheduled."
      - "Examined the new section for seams or joins. None found. Wallpaper, carpet, and tiles match perfectly. Paint shows identical aging. The section appears to have always existed."
      - "Witness (Employee #3190): 'I walked through at lunch. Normal. Walked back after — it was longer. Same room numbers, just more rooms between them.'"
      - "48-hour follow-up: 14-D now measures 29m. Shorter than the original survey. Three offices that existed are gone. Their room numbers no longer appear in the directory."
      - "Recommendation: Stop measuring the corridors. The measurements are accurate each time, which means the building is changing. Knowing that hasn't helped. If anything, it's gotten worse since we started."

  - title: "Meeting Minutes (Undated)"
    author: "HR Department"
    pages:
      - "Attendees: D. Chen (chair), R. Alvarez, P. Okonkwo, M. [ILLEGIBLE], one other (unidentified).\nAgenda: Q3 review, facilities update, new hire.\nNote: Room B-4 was used. B-4 is not on the floor plan."
      - "Item 1 — Productivity: Q3 numbers strong. Several employees working through the night voluntarily. D. Chen noted 'voluntarily' may not be the right word, as some cannot find the exit."
      - "Item 2 — Facilities: East wing expansion complete. No one authorized an expansion. 14 new offices, all furnished, all with nameplates. Names match no current employees."
      - "Item 3 — New Hire: Employee found at a desk in corridor 9. No paperwork exists. Reports feeling 'like I've always worked here.' Badge photo matches. Nobody made the badge."
      - "Item 4 [ADDED BY HAND]: Who was the fifth person in the meeting? Four on the invite. Five chairs occupied. No one can describe the fifth attendee. The fifth set of initials is mine. I was not at this meeting."

  - title: "Letter Home (unsent)"
    author: "Employee #2441"
    pages:
      - "Dear Sarah,\nI know I haven't written in a while. Work has been busy. The office is fine — yellow walls, buzzing lights, damp carpet. Normal stuff."
      - "I've been working late because I can't find the parking garage. The stairwell that goes there now goes to another floor that looks exactly like this one. I'm sure they'll fix it."
      - "Sarah, how long have I worked here? I tried to remember my start date and couldn't. I remember the hallways, the desk, the hum. I've always been here. That can't be right."
      - "I tried to leave today. Walked toward the exit and it wasn't there. Just more hallway. I walked for an hour. More hallway. The carpet was wet. I came back to my desk."
      - "I'm not sure you exist. I've been trying to picture your face and I can't. I can picture the hallway. I can picture my desk. But your face is just yellow wallpaper."
      - "I'm going to leave this in a book on a shelf. If you get this, I'm on the ground floor. Please come find me. Please remember what I look like."

  - title: "The Cartographer's Notes"
    author: "M.E.G. Operative"
    pages:
      - "Day 1: Beginning systematic mapping of Level 0. Standard grid paper, compass bearings every 50m. Initial readings normal. Corridors run N-S and E-W, ~4m wide, ceiling ~3m."
      - "Day 3: Covered ~2 square km. Grid is regular except two areas where corridors curve 2-3 degrees. Compass reads normally. Adjusting map."
      - "Day 5: Problem. A complete loop — corridor 7-N connects back to 7-N, but my map says they're 400m apart. Compass and pace count both correct. The geometry doesn't close."
      - "Day 8: Stopped using the compass. A hallway runs north 200m, east 200m, south 200m, west 200m — and I am not where I started. The math demands I should be."
      - "Day 12: The map is useless. Same area, different map each time. Not errors — the layout changes. Corridors vanish. New ones appear. My old maps show rooms no one has ever seen."
      - "Day ??: Burned the maps. The Lobby cannot be mapped. Mapping it was making it worse — it was growing to fill the map, always one step ahead of the pencil."

  - title: "Break Room Logbook"
    author: "Various"
    pages:
      - "4/3 — Coffee maker broken. -R.A.\n4/3 — Works fine for me? Made a pot at lunch. -D.W.\n4/3 — The pot D.W. made is ice cold and looks weeks old. -R.A.\n4/3 — I made it twenty minutes ago. -D.W."
      - "4/7 — Has anyone seen the microwave? -P.J.\n4/7 — What microwave? -R.A.\n4/7 — The one that's been here three years. -P.J.\n4/8 — Never been a microwave here. -D.W.\n4/9 — Found it in corridor 15. Plugged into a wall with no outlet. Running. -P.J."
      - "4/14 — Who leaves the lights on overnight? -R.A.\n4/14 — There's no switch. -D.W.\n4/15 — Since when? -R.A.\n4/15 — I've worked here eleven years. Never been a switch. -D.W.\n4/15 — D.W., we've worked here four months. -R.A."
      - "4/21 — Someone left a cake in the fridge. -P.J.\n4/22 — There's another cake. Same flavor. I didn't put it there. -P.J.\n4/23 — Now four cakes. -P.J.\n4/24 — I've stopped counting the cakes. The fridge is full. -P.J."
      - "5/1 — How long have we kept this logbook? Entries go back to January but I don't know half the handwriting. -R.A.\n5/1 — Always been here. -D.W.\n5/1 — D.W., who are you? I've never met you. -R.A.\n5/1 — Strange thing to say after eleven years. -D.W."

  - title: "Security Camera Transcript"
    author: "Building Management"
    pages:
      - "CAM 7-B — CORRIDOR 14\n03:00:00 Corridor empty. Lights nominal.\n03:00:23 Lights flicker (0.4s).\n03:00:24 Chair now visible in center of corridor. Not there at 03:00:22. No one entered."
      - "03:15:00 Employee at far end, walking south. Badge not visible.\n03:15:30 Employee stops. Turns to face camera directly.\n03:15:31 Employee no longer in frame. No exit between 03:15:30 and 03:15:31. Chair is gone."
      - "03:30:00 Corridor appears 15m longer than plans indicate. Camera hasn't moved.\n03:30:01 New door on east wall. Not in any previous frame.\n03:45:00 Door is gone. Wall is continuous."
      - "04:00:00 A second Camera 7-B is visible in corridor, mounted 40m ahead. Our camera and the second camera are looking at each other. Both are real. Both broadcast. Neither was installed by our team."
      - "NOTE: Camera 7-B decommissioned. It is still broadcasting. We cannot access the room it's mounted in. The corridor no longer appears on the floor plan. The feed continues."

  - title: "Notice from Management"
    author: "Building Management"
    pages:
      - "TO: All Sub-Level 0 Employees\nRE: Recent Changes\n\nSome corridors may appear longer or shorter than usual. This is part of a planned renovation. Do not file maintenance requests regarding hallway length."
      - "RE: Clarification\n\nThe renovation is ongoing and has always been ongoing. There is no completion date. Please do not ask about a completion date."
      - "RE: Floor 2\n\nFloor 2 does not exist. References to Floor 2 in previous memos, signage, and elevator panels are errors. The elevator has been corrected."
      - "RE: Employee Conduct\n\nSome employees have been 'exploring' outside their sectors. This is not permitted. Your sector is your sector. The hallways beyond it are not for you."
      - "RE: The Hum\n\nThe hum is produced by the HVAC system at 277 Hz. It does not change pitch. It does not respond to your presence. It does not get louder when you are alone. Stop filing reports."
      - "TO: [NOT FOUND]\nRE: [NOT FOUND]\n\nYour employment has been [NOT FOUND]. Report to [NOT FOUND] by [NOT FOUND].\nSincerely, [NOT FOUND]."

  - title: "Research Notes: Acoustic Analysis"
    author: "Dr. Vasquez"
    pages:
      - "Subject: Ambient tonal phenomenon, Sub-Level 0.\nEquipment: Spectrum analyzer, calibrated mic.\nReading: 277.18 Hz (C#4), 42 dB SPL. Consistent across all locations tested (n=15). Source direction: omnidirectional."
      - "Day 2: Tone is identical in every room — same frequency, amplitude, phase. Sound should attenuate with distance. This does not. Every point in the building is equidistant from the source."
      - "Day 4: Attempted cancellation with anti-phase 277 Hz signal. The ambient tone increased by exactly my cancellation amount. Net change: zero. The tone compensates."
      - "Day 6: 72-hour recording reveals micro-variations: pitch shifts +-0.003 Hz on a ~23 second cycle. The cycle is not mechanical. It resembles respiration."
      - "Day 8: Played the recording back. The ambient tone in the room shifted to harmonize — a perfect fifth above. When I stopped, it returned to C#4. It was listening."
      - "Day 9: Discontinuing research. Woke up humming C#4 in my sleep. The analyzer recorded it. My waveform was identical to the ambient tone. Same phase. It was humming through me."

  - title: "Patient Notes (misplaced)"
    author: "Dr. [REDACTED]"
    pages:
      - "Patient: [WITHHELD], age 34. Referred for persistent spatial disorientation. Reports hallways at work that extend, rooms that appear and disappear, doors that open to wrong locations."
      - "Session 2: Patient agitated. Brought hand-drawn maps showing impossible geometry — corridors that loop, rooms larger inside than outside. Maps are detailed and consistent between sessions."
      - "Session 3: Reports fluorescent lights 'respond to my presence.' Says the buzzing changes pitch in certain rooms. Has begun hearing the buzzing at home. Prescribed anxiolytic."
      - "Session 4: Workplace assessment attempted. Address does not exist. Street exists, number does not. No record of employer in any registry. Patient insists she drives there daily."
      - "Session 5: Patient did not attend. Phone disconnected. Sister says she left for work three days ago and hasn't returned. Employer phone rings to a continuous C#4 tone."
      - "Session 6: This file should not exist. I have no record of this patient. The notes are in my handwriting. I drove to the address. The building was real. The carpet was yellow. I sat at a desk."

  - title: "The Electrician's Report"
    author: "Maintenance"
    pages:
      - "Work Order #0041 — Sector 7.\nComplaint: 'Lights flickering in corridors 3-11.'\nArrived 08:00. Confirmed flickering in 3, 5, 7, 9. Corridors 4, 6, 8 steady. Alternating pattern suggests circuit fault."
      - "Opened ceiling in corridor 3 to trace wiring. Found standard T8 fixture, standard ballast. Followed wire to junction box. Box is empty — no connections. Wire enters one side and exits the other. The box is decorative."
      - "Followed wire to origin point. Runs 80m through three walls. At the origin, wire terminates in the ceiling tile itself — just copper pressed into tile material. The light should not be receiving power."
      - "Tested voltage at fixture: 120V steady. At wire origin: 120V steady. Disconnected wire completely. Fixture continues to operate. Non-contact detector reads: entire ceiling radiates 120V."
      - "I cannot explain these findings. The lights work without wiring, without a power source, without a circuit. The flicker pattern is too regular for a fault. It's intentional."
      - "Closing as 'unable to resolve.' The lights flicker because they want to. I understand this is not satisfactory. I don't have a better answer. I'm going home. If I can find the exit."
