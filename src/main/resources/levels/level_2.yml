id: level_2
display_name: "The Pipe Works"
generator: level_2
environment: NETHER
dimension_type: dark
biome: "backrooms:pipe_works"
enter_message: "§7The pipes groan."

events:
  - ambient_sound
  # - blackout
  - footstep_echo
  - sign_placement

entities:
  - herobrine

entity_instances:
  level2_mannequin_stalker:
    type: mannequin
    skin: "https://textures.minecraft.net/texture/1a3ff7558569a21e1d6bc1f586b0edc05c03289791025408653dd4b0bc92010a"  # null-eyes-red
    scale: 1.0
    behavior: stalk
    spawn_chance: 0.08
    min_escalation: 0
    stalk:
      approach_speed: 0.03
      despawn_distance: 4.0
  level2_floating_head:
    type: floating_head
    skin: "https://textures.minecraft.net/texture/1f9bb81a753539621f493375a65a5a33ce99a17088af3444aa6f10b4532f1653"  # noise
    scale: 1.2
    behavior: stationary_stare
    spawn_chance: 0.10
    min_escalation: 0
    stationary_stare:
      despawn_distance: 5.0
  level2_mannequin_angel:
    type: mannequin
    skin: "https://textures.minecraft.net/texture/d63139c6ee85655d6ef54c8d329bd597833b94dcd6b756e12fcdc171358a2b69"  # faceless-steve
    scale: 1.0
    behavior: weeping_angel
    spawn_chance: 0.07
    min_escalation: 0
    weeping_angel:
      look_angle: 25.0
      approach_interval_ticks: 5
      approach_distance: 2.5
      close_distance: 8.0
  level2_attacker:
    type: mannequin
    skin: "https://textures.minecraft.net/texture/bd1d18e03278a7057ff7c4fe10b8c99f31529b1d6e6683ef122d3a825358a60e"  # null-scary-face
    scale: 1.0
    behavior: attack
    spawn_chance: 0.05
    min_escalation: 1
    attack:
      charge_speed: 0.7
      attack_distance: 2.0
      damage: 10.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 6
    chance: 0.25
    sounds:
      - ambient.cave
      - ambient.nether_wastes.mood
      - ambient.basalt_deltas.mood
  # blackout:
  #   enabled: true
  #   check_interval_seconds: 90
  #   chance: 0.08
  #   radius: 25
  #   duration_seconds: 10
  #   light_y: 11
  #   light_spacing: 8
  #   light_material: LANTERN
  footstep_echo:
    enabled: true
    check_interval_seconds: 4
    chance: 0.3
    delay_ticks: 6
    offset_blocks: 4
  sign_placement:
    enabled: true
    check_interval_seconds: 90
    chance: 0.10
    messages:
      - "CAUTION: STEAM"
      - "maintenance access DENIED"
      - "DO NOT ENTER"
      - "valve 7 — DO NOT OPEN"
      - "pressure nominal"
      - "the pipes are breathing"
      - ""
      - "someone turned the valve"
      - "it came from the pipes"
      - "no maintenance scheduled"

exit_triggers:
  - type: below_y
    target_level: level_37
    y_threshold: -10
    transition:
      blindness_ticks: 80
      delay_ticks: 40
      message: "You hear rushing water ahead..."
      sound: ambient.underwater.enter
