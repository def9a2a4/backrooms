id: level_2
display_name: "The Pipe Works"
generator: level_2
environment: NETHER
dimension_type: dark
biome: "backrooms:pipe_works"
enter_message: "§7The pipes groan."

events:
  - ambient_sound
  # - blackout
  - footstep_echo
  - sign_placement

entities:
  - herobrine

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 6
    chance: 0.25
    sounds:
      - ambient.cave
      - ambient.nether_wastes.mood
      - ambient.basalt_deltas.mood
  # blackout:
  #   enabled: true
  #   check_interval_seconds: 90
  #   chance: 0.08
  #   radius: 25
  #   duration_seconds: 10
  #   light_y: 11
  #   light_spacing: 8
  #   light_material: LANTERN
  footstep_echo:
    enabled: true
    check_interval_seconds: 4
    chance: 0.3
    delay_ticks: 6
    offset_blocks: 4
  sign_placement:
    enabled: true
    check_interval_seconds: 90
    chance: 0.10
    messages:
      - "CAUTION: STEAM"
      - "maintenance access DENIED"
      - "DO NOT ENTER"
      - "valve 7 — DO NOT OPEN"
      - "pressure nominal"
      - "the pipes are breathing"
      - ""
      - "someone turned the valve"
      - "it came from the pipes"
      - "no maintenance scheduled"

exit_triggers:
  - type: below_y
    target_level: level_37
    y_threshold: -10
    transition:
      blindness_ticks: 80
      delay_ticks: 40
      message: "You hear rushing water ahead..."
      sound: ambient.underwater.enter
