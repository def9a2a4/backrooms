id: level_5
display_name: "Disc 11"
generator: level_5
environment: THE_END
enter_message: "§8You hear footsteps."

events:
  - ambient_sound
  - footstep_echo
  - torch_decay

entities:
  - pursuer
  - herobrine

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - AMBIENT_CAVE
      - AMBIENT_CRIMSON_FOREST_MOOD
  footstep_echo:
    enabled: true
    check_interval_seconds: 2
    chance: 0.6
    delay_ticks: 15
    offset_blocks: 12
  torch_decay:
    enabled: true
    check_interval_seconds: 90
    chance: 0.4
    radius: 20
    extinguish_chance: 0.3
