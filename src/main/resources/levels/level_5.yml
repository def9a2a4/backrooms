id: level_5
display_name: "Disc 11"
generator: level_5
environment: NETHER
dimension_type: dark
biome: "backrooms:disc_11"
enter_message: "§8You hear footsteps."

events:
  - ambient_sound
  - footstep_echo
  - torch_decay
  - sign_placement
  - fake_chat_message

entities:
  - pursuer
  - herobrine

entity_instances:
  level5_floating_head:
    type: floating_head
    skin: "https://textures.minecraft.net/texture/1daa0dbc6ae76a5caa826d0bc0f18e792c7d5d761e4b30eddba6a76203cee37"  # null-eyes
    scale: 1.0
    behavior: flee
    spawn_chance: 0.12
    min_escalation: 0
    flee:
      trigger_distance: 20.0
      look_angle: 30.0
      flee_speed: 0.15
      max_distance: 60.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - ambient.cave
      - ambient.crimson_forest.mood
  footstep_echo:
    enabled: true
    check_interval_seconds: 2
    chance: 0.6
    delay_ticks: 15
    offset_blocks: 12
  torch_decay:
    enabled: true
    check_interval_seconds: 90
    chance: 0.4
    radius: 20
    extinguish_chance: 0.3
  sign_placement:
    enabled: true
    check_interval_seconds: 60
    chance: 0.12
    messages:
      - "behind you"
      - "STOP"
      - ""
      - "it knows you're here"
      - "don't stop moving"
      - "play the disc"
      - "1:05 of 1:11"
      - "the recording knows"
      - "do not use the jukebox"
      - "you can hear it breathing"
      - "it's closer now"
      - "the footsteps aren't yours"
  fake_chat_message:
    enabled: true
    check_interval_seconds: 90
    chance: 0.10
    messages:
      - "§7[?] §o{player} hears breathing"
      - "§7[?] §oSomething shifts in the dark"
      - "<C418> you weren't supposed to find this"
      - "§7[?] §oThe recording skips"
      - "§7[?] §oFootsteps. Not yours."
      - "§7[?] §oIt's closer now."
