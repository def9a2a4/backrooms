enter_message: "§8§kxxxx§r §7You find yourself among infinite shelves. §8§kxxxx"

events:
  - ambient_sound
  - footstep_echo

entities: []

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 8
    chance: 0.2
    sounds:
      - ambient.cave
      - ambient.warped_forest.mood
  footstep_echo:
    enabled: true
    check_interval_seconds: 3
    chance: 0.5
    delay_ticks: 12
    offset_blocks: 8
exit_triggers:
  - type: collect_items
    target_level: overworld
    item: WRITTEN_BOOK
    threshold: 16
    transition:
      blindness_ticks: 80
      delay_ticks: 30
  - type: fall_distance
    target_level: overworld
    fall_distance: 200
    transition:
      blindness_ticks: 80
      darkness_ticks: 80
      delay_ticks: 40
      message: "§7The stairs end. You feel yourself falling... and then, light."
