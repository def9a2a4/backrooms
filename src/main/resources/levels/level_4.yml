id: level_4
display_name: "The Far Lands"
generator: level_4
environment: NORMAL
dimension_type: default
biome: "backrooms:far_lands"
fixed_time: 12000
enter_message: "§6[ERR]: java.math.IntergerOverflowError"

events:
  - ambient_sound
  - fake_chat_message
  - player_drift
  - sign_placement

entities:
  - wrong_enderman
  - herobrine

entity_instances:
  level4_mannequin:
    type: mannequin
    skin: player
    scale: 1.0
    behavior: stalk
    spawn_chance: 0.10
    min_escalation: 0
    stalk:
      approach_speed: 0.05
      despawn_distance: 5.0

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 10
    chance: 0.15
    sounds:
      - ambient.cave
  fake_chat_message:
    enabled: true
    check_interval_seconds: 60
    chance: 0.1
    messages:
      - "§7Saving chunks..."
      - "§e[WARN] Player position desynchronized"
      - "§7Herobrine joined the game"
      - "§7Herobrine left the game"
  player_drift:
    enabled: true
    check_interval_seconds: 15
    chance: 0.25
    max_drift: 0.6
  sign_placement:
    enabled: true
    check_interval_seconds: 45
    chance: 0.15
    messages:
      - "Level -1"
      - "exit: none"
      - "DON'T TURN AROUND"
      - ""
