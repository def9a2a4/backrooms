id: level_4
display_name: "The Far Lands"
generator: level_4
environment: NORMAL
fixed_time: 12500
enter_message: "§6[ERR]: java.math.IntergerOverflowError"

events:
  - ambient_sound
  - fake_chat_message
  - fake_coordinates
  - player_drift

entities:
  - wrong_enderman
  - herobrine

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 10
    chance: 0.15
    sounds:
      - AMBIENT_CAVE
  fake_chat_message:
    enabled: true
    check_interval_seconds: 60
    chance: 0.1
    messages:
      - "§7Saving chunks..."
      - "§e[WARN] Player position desynchronized"
      - "§7Herobrine joined the game"
      - "§7Herobrine left the game"
  fake_coordinates:
    enabled: true
    check_interval_seconds: 1
    chance: 1.0
    base_x: 12550821
    base_z: -8371022
    drift_range: 500
  player_drift:
    enabled: true
    check_interval_seconds: 15
    chance: 0.25
    max_drift: 0.6
