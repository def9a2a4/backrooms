id: level_4
display_name: "The Far Lands"
generator: level_4
environment: NORMAL
dimension_type: default
biome: "backrooms:far_lands"
fixed_time: 12000
enter_message: "§6[ERR]: java.math.IntergerOverflowError"

events:
  - ambient_sound
  - fake_chat_message
  - player_drift

entities:
  - wrong_enderman
  - herobrine

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 10
    chance: 0.15
    sounds:
      - ambient.cave
  fake_chat_message:
    enabled: true
    check_interval_seconds: 60
    chance: 0.1
    messages:
      - "§7Saving chunks..."
      - "§e[WARN] Player position desynchronized"
      - "§7Herobrine joined the game"
      - "§7Herobrine left the game"
  player_drift:
    enabled: true
    check_interval_seconds: 15
    chance: 0.25
    max_drift: 0.6
exit_triggers:
  - type: walk_distance
    target_level: level_3
    distance_blocks: 1000
    transition:
      blindness_ticks: 80
      delay_ticks: 20
      message: "The terrain loops back on itself..."
