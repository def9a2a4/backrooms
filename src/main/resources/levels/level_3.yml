id: level_3
display_name: "The Server Room"
generator: level_3
environment: THE_END
enter_message: "§c[ERR] §7Unauthorized access detected."

events:
  - ambient_sound
  - light_blink
  - inventory_glitch

entities: []

event_config:
  ambient_sound:
    enabled: true
    check_interval_seconds: 4
    chance: 0.35
    sounds:
      - AMBIENT_CAVE
      - AMBIENT_WARPED_FOREST_MOOD
  light_blink:
    enabled: true
    check_interval_seconds: 15
    chance: 0.25
    radius: 15
    cycles: 6
    toggle_delay_ticks: 3
  inventory_glitch:
    enabled: true
    check_interval_seconds: 60
    chance: 0.1
    swap_count: 3
    restore_delay_ticks: 40
